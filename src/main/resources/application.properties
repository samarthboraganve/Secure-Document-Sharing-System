spring.application.name=secure_document_sharing

spring.datasource.url=jdbc:mysql://localhost:3306/secure_document_sharing
spring.datasource.username=root
spring.datasource.password=${MYSQL_ROOT_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

app.jwt.issuer=secure-document-sharing
app.jwt.secret= dev-only-change-me-use-at-least-32-chars-for-hs256-key!!
app.jwt.expiration-minutes=60

app.storage.root-directory=uploads

# Used for absolute shareUrl on POST /api/documents/{id}/share. GET /api/share/{token} is public (no JWT).
app.share.public-base-url=http://localhost:8080
